services:
  db:
    image: postgres:15
    container_name: dev_sphere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: DevSphere
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d DevSphere']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be fully ready
    env_file:
      - .env
    ports:
      - '3000:3000'
